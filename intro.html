<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE OUTSIDERS — Intro</title>
<style>
  :root { --yellow:#f5e000; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:#000; height:100%; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; }

  /* 16:9 stage, yellow to match the logo background */
  .stage {
    position:relative; width:100vw; height:56.25vw; max-height:100vh; max-width:177.78vh;
    background:var(--yellow); overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }

  /* logo split into vertical slices */
  .logo {
    position:relative; width:82%; max-width:1180px;
    aspect-ratio: 2752 / 1536;
  }
  .slice {
    position:absolute; top:0; height:100%;
    background-image:url("logo.png"); background-repeat:no-repeat;
    transform: translateY(115%); opacity:0;
    will-change: transform, opacity;
  }
  .playing .slice {
    animation: slicein .34s cubic-bezier(.18,.9,.28,1.25) forwards;
    animation-delay: var(--d);
  }
  @keyframes slicein { to { transform: translateY(0); opacity:1; } }

  /* whole-logo settle bounce once all slices are in */
  .playing .logo { animation: settle .35s ease-out .85s both; }
  @keyframes settle { 0%{transform:scale(1);} 45%{transform:scale(1.035);} 100%{transform:scale(1);} }

  /* quick opening flash */
  .flash { position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; }
  .playing .flash { animation: flash .5s ease-out forwards; }
  @keyframes flash { 0%{opacity:1;} 30%{opacity:0;} 100%{opacity:0;} }

  .replay {
    position:fixed; bottom:14px; right:14px; z-index:50;
    background:#111; color:#fff; border:1px solid #333; border-radius:8px;
    font-family:monospace; font-size:13px; padding:8px 14px; cursor:pointer; opacity:.55;
  }
  .replay:hover { opacity:1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="logo" id="logo"></div>
    <div class="flash"></div>
  </div>
  <button class="replay" onclick="play()">↻ Replay</button>
<script>
  const N = 16;                  // number of vertical slices
  const logo = document.getElementById('logo');
  const stage = document.getElementById('stage');
  // build slices once
  for (let i = 0; i < N; i++) {
    const s = document.createElement('div');
    s.className = 'slice';
    s.style.left = (i * 100 / N) + '%';
    s.style.width = (100 / N) + '%';
    s.style.backgroundSize = (N * 100) + '% 100%';
    s.style.backgroundPositionX = (N > 1 ? (i / (N - 1)) * 100 : 0) + '%';
    s.style.setProperty('--d', (i * 0.04).toFixed(3) + 's');
    logo.appendChild(s);
  }
  function play(){
    stage.classList.remove('playing');
    void stage.offsetWidth;      // reflow to restart
    stage.classList.add('playing');
  }
  window.addEventListener('load', play);
</script>
</body>
</html>
